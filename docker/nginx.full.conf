# Full nginx config — site + editor + player + copilot + multiplayer.
# Differs from nginx.basic.conf only in that /api/* is reverse-proxied
# to the Go AI server (`ai-server` service in docker-compose.full.yml)
# and /colyseus/* is reverse-proxied to the multiplayer sidecar.
#
# IMPORTANT: we resolve sidecar hostnames at request time, not at
# nginx-worker boot time. nginx normally caches upstream IPs forever,
# which is fine in static deploys but breaks under Docker Compose when
# a sidecar container is recreated and gets a new IP. The `resolver`
# directive + variable-in-proxy_pass pattern forces a fresh DNS lookup
# against Docker's embedded resolver (127.0.0.11) on every request.

# Docker's embedded DNS resolver (always at 127.0.0.11 inside the user
# bridge network). ipv6=off because the busybox-style resolver can return
# empty AAAA records that nginx then tries to use.
resolver 127.0.0.11 valid=10s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 64m;

    # Long cache for hashed assets.
    location ~* ^/assets/.+-[A-Za-z0-9_-]+\.(js|css|png|jpg|jpeg|webp|svg|woff2?|ttf|gif|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # AI server proxy --------------------------------------------------------
    # Using a variable in proxy_pass forces nginx to resolve `ai-server`
    # on every request, which survives Compose container restarts.
    location /api/ {
        set $ai_upstream "ai-server:8081";
        proxy_pass http://$ai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503;
    }

    # Multiplayer (Colyseus) — HTTP matchmaking + WebSocket -----------------
    location /matchmake/ {
        set $mp_upstream "mp-server:2567";
        proxy_pass http://$mp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location /colyseus/ {
        set $mp_upstream "mp-server:2567";
        proxy_pass http://$mp_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
    }

    # Player -----------------------------------------------------------------
    location ^~ /play/ {
        try_files $uri /play.html;
    }

    # Editor -----------------------------------------------------------------
    location ^~ /create/project {
        try_files $uri /editor.html;
    }
    location ^~ /stem-editor/ {
        try_files $uri /editor.html;
    }

    # Public site (landing, docs, playground iframe wrapper) -----------------
    location = / {
        try_files /index.html =404;
    }
    location ^~ /docs {
        try_files $uri /index.html;
    }
    location ^~ /playground {
        try_files $uri /index.html;
    }

    # App shell --------------------------------------------------------------
    location ^~ /dashboard {
        try_files $uri /shell.html;
    }
    location ~ ^/(discover|browse|game|my-avatars|settings|search|legal|3rd-party-attributions|contact-us|about|login|signup|register|forgot-password|waitlist|admin-panel|forum|news|learn|remix|view-more)(/|$) {
        try_files $uri /shell.html;
    }

    # Catch-all → site.
    location / {
        try_files $uri /index.html;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}

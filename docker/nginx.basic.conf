# Basic nginx config — site + editor + player only.
# No /api proxy. The Copilot panel hides itself when no AI provider is
# registered, so the editor still works end-to-end without an AI backend.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets, short cache for everything else.
    # Vite hashes are base64url-ish (e.g. About-Di14DbJm.js) — accept any
    # word chars after the trailing dash, not just lowercase hex.
    location ~* ^/assets/.+-[A-Za-z0-9_-]+\.(js|css|png|jpg|jpeg|webp|svg|woff2?|ttf|gif|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # /api/* has no upstream in basic mode. Return 503 fast so the editor
    # client treats AI calls as unavailable instead of hanging.
    location /api/ {
        add_header Content-Type application/json always;
        return 503 '{"error":"AI server not enabled in this deployment. Use docker-compose.full.yml to bring up the copilot."}';
    }

    # Player ------------------------------------------------------------------
    location ^~ /play/ {
        try_files $uri /play.html;
    }

    # Editor ------------------------------------------------------------------
    location ^~ /create/project {
        try_files $uri /editor.html;
    }
    location ^~ /stem-editor/ {
        try_files $uri /editor.html;
    }

    # Public site (landing, docs, playground iframe wrapper) ------------------
    location = / {
        try_files /index.html =404;
    }
    location ^~ /docs {
        try_files $uri /index.html;
    }
    location ^~ /playground {
        try_files $uri /index.html;
    }

    # App shell (dashboard, project list, etc.) -------------------------------
    location ^~ /dashboard {
        try_files $uri /shell.html;
    }
    location ~ ^/(discover|browse|game|my-avatars|settings|search|legal|3rd-party-attributions|contact-us|about|login|signup|register|forgot-password|waitlist|admin-panel|forum|news|learn|remix|view-more)(/|$) {
        try_files $uri /shell.html;
    }

    # Catch-all → site (renders the React 404 page).
    location / {
        try_files $uri /index.html;
    }

    # Health endpoint for compose healthchecks.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}

<!doctype html>
<html lang="en-US">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <title>StemStudio Player</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="format-detection" content="telephone=no" />
        <script>
            window.process = window.process || {};
            window.process.nextTick = window.process.nextTick || function (fn) {
              window.setTimeout(fn, 0);
            };
            const urlParams = new URLSearchParams(window.location.search);
            const platformParam = urlParams.get("platform");
            if (platformParam !== "capacitor") {
                document.write('<meta name="apple-touch-fullscreen" content="yes" />');
            }
        </script>
        <link href="/assets/css/fonts.css" rel="stylesheet" />
        <style>
            :root {
                --safe-area-inset-top: env(safe-area-inset-top);
                --safe-area-inset-right: env(safe-area-inset-right);
                --safe-area-inset-bottom: env(safe-area-inset-bottom);
                --safe-area-inset-left: env(safe-area-inset-left);
            }

            body {
                margin: 0;
                padding: 0;
                padding-top: var(--safe-area-inset-top);
                padding-right: var(--safe-area-inset-right);
                padding-bottom: var(--safe-area-inset-bottom);
                padding-left: var(--safe-area-inset-left);
                background-color: #18181b;
            }

            .player {
                position: absolute;
                left: 0;
                top: 0;
                right: auto;
                bottom: auto;
                width: 100%;
                height: 100%;
                background-color: #18181b;
            }

            #container {
                width: 100%;
                height: 100vh;
                height: calc(100vh - var(--safe-area-inset-top) - var(--safe-area-inset-bottom));
            }
        </style>
    </head>

    <body>
        <div id="container" tabindex="10"></div>
        <script type="module" src="/packages/play/src/index.ts"></script>
    </body>
</html>

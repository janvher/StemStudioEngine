meta:
  tool: StemStudio
  type: import
  exportVersion: 1
config:
  name: prng
  description: |
    Seeded pseudo-random number generator (alea). Deterministic across
    multiplayer clients and replays — give every client the same seed and
    every call to `next()` returns the same sequence everywhere.

    Usage:
      @import "prng" as prng;
      const rng = prng.create("level-42");          // seed by string or number
      const x = rng.next();                          // 0..1
      const dice = rng.intRange(1, 7);               // [1,6] inclusive
      const pick = rng.pick(["a","b","c"]);
      const dup = rng.clone();                       // independent copy at same state
      rng.skip(1000);                                // advance N steps without consuming output

    Reference: Johannes Baagøe's alea (public domain).
code: |
  // Mash hashes a string into a normalized 32-bit-ish float in [0,1).
  function mash(seed) {
      let n = 0xefc8249d;
      const str = String(seed);
      for (let i = 0; i < str.length; i++) {
          n += str.charCodeAt(i);
          let h = 0.02519603282416938 * n;
          n = h >>> 0;
          h -= n;
          h *= n;
          n = h >>> 0;
          h -= n;
          n += h * 0x100000000;
      }
      return (n >>> 0) * 2.3283064365386963e-10;
  }

  function build(seedOrNothing) {
      const seed = seedOrNothing === undefined ? Date.now() : seedOrNothing;
      let s0 = mash(" ");
      let s1 = mash(" ");
      let s2 = mash(" ");
      let c = 1;
      s0 -= mash(seed); if (s0 < 0) s0 += 1;
      s1 -= mash(seed); if (s1 < 0) s1 += 1;
      s2 -= mash(seed); if (s2 < 0) s2 += 1;

      function next() {
          const t = 2091639 * s0 + c * 2.3283064365386963e-10;
          s0 = s1;
          s1 = s2;
          c = t | 0;
          s2 = t - c;
          return s2;
      }

      return {
          /** Float in [0,1). */
          next,
          /** Float in [min, max). */
          range(min, max) { return min + (max - min) * next(); },
          /** Integer in [minInclusive, maxExclusive). */
          intRange(min, maxExclusive) {
              return Math.floor(min + (maxExclusive - min) * next());
          },
          /** -1 or 1, with optional bias toward 1 in [0..1]. */
          sign(biasTowardPositive) {
              const b = biasTowardPositive == null ? 0.5 : biasTowardPositive;
              return next() < b ? 1 : -1;
          },
          /** Pick a random element. */
          pick(arr) {
              if (!arr || arr.length === 0) return undefined;
              return arr[Math.floor(next() * arr.length)];
          },
          /** Fisher–Yates shuffle in place. Returns the array. */
          shuffle(arr) {
              for (let i = arr.length - 1; i > 0; i--) {
                  const j = Math.floor(next() * (i + 1));
                  const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
              }
              return arr;
          },
          /** Advance the stream by `steps` without using the output. */
          skip(steps) {
              for (let i = 0; i < steps; i++) next();
          },
          /** Independent copy at the current state. */
          clone() {
              const r = build(0);
              // overwrite internal state via a fresh closure capture
              const snapshot = {s0, s1, s2, c};
              const proxy = build.fromState(snapshot);
              return proxy;
          },
      };
  }

  // fromState lets clone() restore the exact internal state.
  build.fromState = function (snap) {
      let s0 = snap.s0, s1 = snap.s1, s2 = snap.s2, c = snap.c;
      function next() {
          const t = 2091639 * s0 + c * 2.3283064365386963e-10;
          s0 = s1; s1 = s2; c = t | 0; s2 = t - c;
          return s2;
      }
      return {
          next,
          range(min, max) { return min + (max - min) * next(); },
          intRange(min, maxEx) { return Math.floor(min + (maxEx - min) * next()); },
          sign(b) { const x = b == null ? 0.5 : b; return next() < x ? 1 : -1; },
          pick(arr) { return (arr && arr.length) ? arr[Math.floor(next() * arr.length)] : undefined; },
          shuffle(arr) {
              for (let i = arr.length - 1; i > 0; i--) {
                  const j = Math.floor(next() * (i + 1));
                  const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
              }
              return arr;
          },
          skip(n) { for (let i = 0; i < n; i++) next(); },
          clone() { return build.fromState({s0, s1, s2, c}); },
      };
  };

  exports.create = build;
